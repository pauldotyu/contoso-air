name: Deploy to AKS

on:
  workflow_dispatch:
    inputs:
      cluster-name:
        description: 'AKS cluster name'
        required: true
        default: 'aks-desktop35'
      resource-group:
        description: 'Azure resource group'
        required: true
        default: 'rg-desktop35'
      namespace:
        description: 'Kubernetes namespace'
        required: true
        default: 'ns687'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          cluster-name: ${{ inputs.cluster-name }}
          resource-group: ${{ inputs.resource-group }}

      - name: Install kubelogin
        uses: azure/use-kubelogin@v1
        with:
          skip-cache: 'true'

      - name: Convert kubeconfig for kubelogin
        run: kubelogin convert-kubeconfig -l workloadidentity

      - name: Build and push image via ACR Tasks
        run: |
          az acr build \
            --registry ${{ secrets.AZURE_ACR_NAME }} \
            --image contoso-air:${{ github.sha }} \
            .

      - name: Update image reference in manifests
        run: |
          sed -i "s|contoso-air:1.0|acrdesktop35.azurecr.io/contoso-air:${{ github.sha }}|g" deploy/kubernetes/*.yaml

      - name: Deploy to AKS
        run: kubectl apply -f deploy/kubernetes/ -n ${{ inputs.namespace }}

      - name: Annotate deployments with pipeline info
        run: |
          kubectl annotate deployment --all \
            -n ${{ inputs.namespace }} \
            aks-project/pipeline-run-url=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} \
            "aks-project/pipeline-workflow=${{ github.workflow }}" \
            --overwrite
