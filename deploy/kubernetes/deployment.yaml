apiVersion: apps/v1
kind: Deployment
metadata:
  name: contoso-air
  namespace: ns687
  annotations:
    aks-project/deployed-by: pipeline
    aks-project/pipeline-repo: pauldotyu/contoso-air
  labels:
    app: contoso-air
spec:
  replicas: 1
  selector:
    matchLabels:
      app: contoso-air
  template:
    metadata:
      labels:
        app: contoso-air
    spec:
      securityContext:
        runAsNonRoot: false
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: contoso-air
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: contoso-air
                topologyKey: kubernetes.io/hostname
      containers:
        - name: contoso-air
          # Image is updated at deploy time by the GitHub Actions workflow (deploy-to-aks.yml)
          image: contoso-air:1.0
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /
              port: 3000
            failureThreshold: 30
            periodSeconds: 10
