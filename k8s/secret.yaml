apiVersion: v1
kind: Secret
metadata:
  name: contoso-air-secret
  namespace: contoso-air
  labels:
    app.kubernetes.io/name: contoso-air
type: Opaque
stringData:
  # --- Azure OpenAI API key (used when CHAT_PROVIDER=azure and not using managed identity) ---
  # AZURE_OPENAI_API_KEY: "<your-azure-openai-api-key>"

  # --- OpenAI API key (used when CHAT_PROVIDER=openai) ---
  # OPENAI_API_KEY: "<your-openai-api-key>"
