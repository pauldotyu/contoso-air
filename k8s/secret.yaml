apiVersion: v1
kind: Secret
metadata:
  name: contoso-air-secret
  namespace: contoso-air
  labels:
    app.kubernetes.io/name: contoso-air
type: Opaque
# Values must be base64-encoded. Example: echo -n "my-value" | base64
# Replace the placeholder values below before applying.
stringData:
  # Azure OpenAI API key (leave empty when using managed identity)
  AZURE_OPENAI_API_KEY: ""
  # Azure managed identity client ID (leave empty when using API key)
  AZURE_OPENAI_CLIENTID: ""
  # OpenAI API key
  OPENAI_API_KEY: ""
