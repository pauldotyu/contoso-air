apiVersion: apps/v1
kind: Deployment
metadata:
  name: test
  labels:
    app: test
    kubernetes.azure.com/generator: devhub
  namespace: contoso
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test
  template:
    metadata:
      labels:
        app: test
    spec:
      containers:
        - name: test
          image: acrkaitodemo1975.azurecr.io/contoso-air:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
